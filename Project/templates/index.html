<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI/ML Interactive Visualizer & Playground</title>
    <!-- Thêm font chữ Inter & JetBrains Mono -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <div style="display: flex; align-items: center; gap: 12px;">
                <h1>AI/ML Interactive Visualizer</h1>
                <span class="brand-badge" id="brand-badge-text">Lesson 1-5: Applied AI</span>
            </div>
            <div style="font-size: 13.5px; color: var(--text-muted);">
                Chương trình chuyển ngành AI Engineer
            </div>
        </header>

        <!-- Navbar Tabs -->
        <div class="tab-nav">
            <button class="tab-btn active" id="btn-home" onclick="switchTab('home')">🏠 Home Mindmap (Bài 1-34)</button>
            <button class="tab-btn" id="btn-numpy" onclick="switchTab('numpy')">NumPy Array Lab</button>
            <button class="tab-btn" id="btn-pandas" onclick="switchTab('pandas')">Pandas Query Lab</button>
            <button class="tab-btn" id="btn-eda" onclick="switchTab('eda')">EDA & Data Visualizer</button>
            <button class="tab-btn" id="btn-gradient" onclick="switchTab('gradient')">Gradient Descent Lab</button>
            <button class="tab-btn" id="btn-ml" onclick="switchTab('ml')">ML Playground</button>
            <button class="tab-btn" id="btn-deep" onclick="switchTab('deep')">Deep Learning Lab</button>
            <button class="tab-btn" id="btn-llm" onclick="switchTab('llm')">LLM & Prompting</button>
            <button class="tab-btn" id="btn-rag" onclick="switchTab('rag')">RAG Chatbot</button>
            <button class="tab-btn" id="btn-agent" onclick="switchTab('agent')">AI Agent Hub</button>
            <button class="tab-btn" id="btn-finetune" onclick="switchTab('finetune')">Fine-tuning Lab</button>
            <button class="tab-btn" id="btn-mlops" onclick="switchTab('mlops')">MLOps & Production</button>
        </div>

        <!-- Khung chứa nội dung Tab sẽ được nạp động từ Main.js -->
        <main id="active-tab-content">
            <div style="padding: 40px; text-align: center; color: var(--text-muted);">
                Đang tải giao diện phòng Lab...
            </div>
        </main>
    </div>

    <!-- Script điều hướng trung tâm và logic xử lý -->
    <script src="/static/js/main.js"></script>
</body>
</html>
