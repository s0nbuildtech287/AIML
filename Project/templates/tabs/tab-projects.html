<style>

        margin-top: 4px;

        background: #030712;
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: #cbd5e1;
        padding: 2px 7px;
        border-radius: 4px;
    }

    .projects-count-summary {
        font-size: 12px;
        color: var(--text-muted);
        margin-bottom: 12px;
    }

    @media (max-width: 1024px) {
        .projects-grid {
            grid-template-columns: 1fr;
