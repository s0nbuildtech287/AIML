<div class="grid-layout">
    <!-- Left Side: Query Controller -->
    <div style="display: flex; flex-direction: column; gap: 20px;">
        <!-- Card 1: Load Dataset -->
        <div class="panel">
            <div class="panel-title" style="color: var(--success);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Chọn Tập Dữ Liệu (Load Dataset)
            </div>
            <div class="input-group">
                <label>Chọn nguồn dữ liệu mẫu</label>
                <select id="pandas-dataset-select" class="input-control" onchange="onDatasetChange()">
                    <option value="titanic">Dữ liệu Titanic Passenger (Mẫu 17 bản ghi)</option>
                    <option value="students">Dữ liệu Điểm học sinh (Mẫu 17 bản ghi)</option>
                </select>
            </div>
        </div>

        <!-- Card 2: Filter Query -->
        <div class="panel">
            <div class="panel-title" style="color: var(--warning);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>
                Lọc Điều Kiện (Filter Query)
            </div>
            <div style="display: grid; grid-template-columns: 1.2fr 1fr 1fr; gap: 8px;">
                <div class="input-group">
                    <label>Cột lọc</label>
                    <select id="pandas-filter-col" class="input-control"></select>
                </div>
                <div class="input-group">
                    <label>Phép toán</label>
                    <select id="pandas-filter-op" class="input-control">
                        <option value="">--</option>
                        <option value="==">==</option>
                        <option value="!=">!=</option>
                        <option value=">">&gt;</option>
                        <option value="<">&lt;</option>
                        <option value=">=">&gt;=</option>
                        <option value="<=">&lt;=</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Giá trị lọc</label>
                    <input type="text" id="pandas-filter-val" class="input-control" placeholder="Ví dụ: 30">
                </div>
            </div>
        </div>

        <!-- Card 3: Groupby & Aggregation -->
        <div class="panel">
            <div class="panel-title" style="color: var(--accent);">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Nhóm & Thống Kê (Groupby & Agg)
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="input-group">
                    <label>Cột để nhóm (Groupby)</label>
                    <select id="pandas-group-col" class="input-control"></select>
                </div>
                <div class="input-group">
                    <label>Hàm tổng hợp (Agg)</label>
                    <select id="pandas-agg-op" class="input-control">
                        <option value="mean">Tính trung bình (mean)</option>
                        <option value="sum">Tính tổng (sum)</option>
                        <option value="count">Đếm số lượng (count)</option>
                    </select>
                </div>
            </div>
            <div style="margin-top: 10px;">
                <button class="btn" style="width: 100%;" onclick="runPandasQuery()">
                    <span>Thực thi Truy vấn Pandas</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Right Side: Table output & console trace -->
    <div class="visual-container">
        <div class="visual-card">
            <h3 style="font-size: 13px; color: var(--primary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px;">
                💻 Mã nguồn Pandas thực thi dưới Backend
            </h3>
            <div class="console-box" id="pandas-code-console">
                # Nhập truy vấn để xem cú pháp code Python
            </div>
        </div>

        <div class="visual-card" style="flex: 1; display: flex; flex-direction: column;">
            <h3 style="font-size: 13px; color: var(--success); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px;">
                📊 Kết quả DataFrame (Đầu ra Pandas)
            </h3>
            <div class="pandas-table-container">
                <table class="pandas-table" id="pandas-output-table">
                    <thead>
                        <tr>
                            <th>Cột</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Bảng trống. Vui lòng chọn dataset.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
